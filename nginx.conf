server {
    listen 80;
    server_name _;

    # Serve custom static branding assets
    location /branding/ {
        alias /usr/share/nginx/html/branding/;
        expires 1d;
    }

    # Proxy everything else to ntfy backend
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable gzip from backend so sub_filter can modify HTML responses
        proxy_set_header Accept-Encoding "";

        # WebSocket support (ntfy uses SSE/WebSocket for live updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;

        # Inject branding overrides
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '</head>' '<link rel="stylesheet" href="/branding/custom.css" type="text/css" /></head>';
        sub_filter '</body>' '<script>document.addEventListener("DOMContentLoaded",function(){setTimeout(function(){document.querySelectorAll("[class*=MuiAppBar]").forEach(function(e){e.style.setProperty("background","linear-gradient(150deg,#3A4FCC 0%,#2B7ADB 100%)","important")});document.querySelectorAll("[class*=MuiAppBar] [class*=MuiToolbar]").forEach(function(e){e.style.setProperty("background","transparent","important")});document.querySelectorAll("[class*=MuiDrawer] [class*=MuiToolbar]").forEach(function(e){e.style.removeProperty("background")});var t=document.querySelector("title");if(t)t.textContent="Notification Hub"},1500)},false);</script></body>';
        sub_filter '<title>ntfy web</title>' '<title>Notification Hub</title>';
    }
}
