server {
    listen 80;
    server_name _;

    # Serve custom static branding assets
    location /branding/ {
        alias /usr/share/nginx/html/branding/;
        expires 1d;
    }

    # Proxy everything else to ntfy backend
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable gzip from backend so sub_filter can modify HTML responses
        proxy_set_header Accept-Encoding "";

        # WebSocket support (ntfy uses SSE/WebSocket for live updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;

        # Inject custom CSS link + inline style override + title change
        # sub_filter_once must be off to allow multiple substitutions
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '</head>' '<link rel="stylesheet" href="/branding/custom.css" type="text/css" /></head>';
        sub_filter '</body>' '<style>[class*="MuiToolbar"],[class*="MuiAppBar"]{background:linear-gradient(150deg,#3A4FCC 0%,#2B7ADB 100%)!important;background-image:none!important}[class*="MuiToolbar"] img{content:url(/branding/logo.png)!important;height:32px!important}</style><script>document.addEventListener("DOMContentLoaded",function(){setTimeout(function(){document.querySelectorAll("[class*=MuiToolbar],[class*=MuiAppBar]").forEach(function(e){e.style.setProperty("background","linear-gradient(150deg,#3A4FCC 0%,#2B7ADB 100%)","important")});var t=document.querySelector("title");if(t)t.textContent="Florian Rolke Notifications"},1500)},false);</script></body>';
    }
}
