server {
    listen 80;
    server_name _;

    # Serve custom static branding assets
    location /branding/ {
        alias /usr/share/nginx/html/branding/;
        expires 1d;
    }

    # Proxy everything else to ntfy backend
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (ntfy uses SSE/WebSocket for live updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;

        # Inject custom CSS into HTML responses
        sub_filter '</head>' '<link rel="stylesheet" href="/branding/custom.css" type="text/css" /></head>';
        sub_filter '<title>ntfy</title>' '<title>Florian Rolke Notifications</title>';
        sub_filter_types text/html;
        sub_filter_once on;
    }
}
